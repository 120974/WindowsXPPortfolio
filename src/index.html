  <!-- Critical CSS inlined for faster loading -->
  <style>
    html, body { 
      margin: 0; 
      padding: 0;
      font-family: Tahoma, sans-serif; 
      overflow: hidden;
      height: 100%;
      width: 100%;
      position: fixed;
    }
    #root {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }
    .size-full { width: 100%; height: 100%; }
    .loading-screen { 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      background: #ECE9D8;
      color: #003c71;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <!-- Handle SPA redirects from 404.html -->
  <script>
    (function() {
      var redirect = sessionStorage.getItem('redirect');
      if (redirect && redirect !== '/') {
        sessionStorage.removeItem('redirect');
        // Handle redirect if needed (currently not using client-side routing)
      }
    })();
  </script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/portfolio-xp/sw.js')
          .then((registration) => {
            // Service worker registered successfully
          })
          .catch((registrationError) => {
            // Service worker registration failed
          });
      });
    }
  </script>
  
  <script type="module" src="/App.tsx"></script>
</body>
